name: github-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/github-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Stage docs site
        if: steps.pages.outcome == 'success'
        shell: bash
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -R docs/site/. site-root/
          cp docs/userguide.* site-root/docs/ 2>/dev/null || true
          cp docs/announcement-beta.* site-root/docs/ 2>/dev/null || true
          cp docs/QUILL-PRD.* site-root/docs/ 2>/dev/null || true
      - name: Skip Pages deploy (not enabled)
        if: steps.pages.outcome != 'success'
        shell: bash
        run: |
          echo "GitHub Pages is not enabled or accessible for this repository/token. Skipping deploy without failing CI."
      - uses: actions/upload-pages-artifact@v5
        if: steps.pages.outcome == 'success'
        with:
          path: site-root
      - id: deployment
        uses: actions/deploy-pages@v5
        if: steps.pages.outcome == 'success'
