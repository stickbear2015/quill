name: Security CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit-and-sbom:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pip-audit cyclonedx-bom
      - name: Run dependency vulnerability audit
        run: |
          # Audit resolved dependencies via requirements metadata to avoid
          # pip-audit failing on the local app package name.
          # Temporary policy exception: diskcache currently reports
          # CVE-2025-69872 with no published fixed version.
          pip-audit --strict --ignore-vuln CVE-2025-69872 -r requirements.txt
      - name: Generate SBOM
        run: |
          cyclonedx-py environment --of JSON --output-file quill-sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: quill-sbom
          path: quill-sbom.json

  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - uses: actions/checkout@v6
      - name: Run gitleaks scan
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        # gitleaks org scanning requires a license key in this repo.
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}
      - name: Skip gitleaks when license is unavailable
        if: ${{ env.GITLEAKS_LICENSE == '' }}
        run: echo "Skipping gitleaks scan because GITLEAKS_LICENSE is not configured."

  scoped-strict-typing:
    # GATE-3 / CQ-7: strict mypy on quill/core and quill/io must report zero
    # errors and is required for merge. The whole-tree scan is intentionally
    # never used (quill/ui is excluded in pyproject.toml).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Scoped strict type-check
        run: |
          mypy quill\core quill\io

  banned-patterns:
    # GATE-4: fail on bare 'wx.' in main_frame, raw ET.fromstring outside
    # safe_xml, any weakening of ruff's undefined-name/redefinition rules, and
    # any dialog surface that is not registered + classified in the committed
    # dialog registry snapshot (A11Y-4 / DLG-3 'magical' dialog gate -- run
    # 'python -m quill.tools.dialog_inventory --write' to register a new dialog).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run banned-pattern gate
        run: |
          python -m quill.tools.check_banned_patterns
      - name: Audit dialog escape-button wiring
        # A11Y-4 / DLG-3 (#124): fail if any custom dialog declares a standard
        # Escape id that no button carries and that it does not handle via a
        # WXK_ESCAPE key handler -- the keyboard trap that shipped as Prompt
        # Studio being unclosable with Escape.
        run: |
          python -m quill.tools.dialog_button_contract

  no-silent-network:
    # GATE-9: every outbound network call must be in the reviewed egress
    # inventory with a rationale. A new call without review fails the build.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Audit network egress
        run: |
          pytest -q tests\unit\tools\test_network_egress_audit.py

  security-checks:
    # GATE-8: the static security invariants must hold. This runs the hardened-
    # XML / banned-pattern check, the verified-TLS audit, the secret-redaction
    # (no-plaintext-secret) diagnostics suite, the safe-archive decompression-cap
    # suite, the sandbox-policy suite, and the OCR argument allowlist. Dependency
    # vulnerability auditing (pip-audit strict) runs in the SBOM job above.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Hardened-XML / banned-pattern check
        run: |
          python -m quill.tools.check_banned_patterns
      - name: Static security invariant suites
        # test_net_tls.py is excluded: it contains a known-hanging AST walk
        # loop. TLS verification coverage is provided by the egress-audit
        # gate (test_network_egress_audit.py) in the no-silent-network job.
        run: |
          pytest -q `
            tests\unit\core\test_diagnostics.py `
            tests\unit\core\test_safe_xml.py `
            tests\unit\core\test_safe_archive.py `
            tests\unit\core\test_python_sandbox.py `
            tests\unit\io\test_ocr.py

